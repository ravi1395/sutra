# Builds, signs, and ships an in-app-updater-ready GitHub release on tag push.
#
# Three jobs, on purpose:
#   1. create-release  — make ONE draft release up front, export its id.
#   2. build           — matrix (macOS universal + Windows) uploads bundles and
#                        the updater `latest.json` into that SAME release.
#                        `max-parallel: 1` serializes the uploads so the two
#                        platforms merge into one `latest.json` instead of
#                        racing and clobbering each other's entry.
#   3. publish-release — flip the draft to published + mark it "latest" so the
#                        updater endpoint (releases/latest/.../latest.json)
#                        resolves to it automatically. No manual publish step.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Read package version
        run: echo "PACKAGE_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"
      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `Sutra ${process.env.PACKAGE_VERSION}`,
              body: 'Download the installer for your platform below.',
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      # Serialize so macOS and Windows merge into one latest.json (no race).
      max-parallel: 1
      matrix:
        include:
          # Universal binary: one .dmg covers Apple Silicon + Intel
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          # x64 .msi + NSIS .exe; WebView2 bootstrapper handled by installer
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # Uploads bundles + the signed updater latest.json into the draft release
      # created above (releaseId). tauri-action merges latest.json across the
      # matrix when the asset already exists — combined with max-parallel:1 the
      # final latest.json carries BOTH darwin and windows entries.
      #
      # macOS signing/notarization: uncomment the APPLE_* lines once the repo
      # secrets exist. Passing them unset breaks the build. Without them the
      # .app is ad-hoc signed (users must right-click > Open on first launch);
      # updater minisign verification is independent and still works.
      #
      # REQUIRED secret: TAURI_SIGNING_PRIVATE_KEY must be the ENTIRE contents
      # of the generated .key file (the `untrusted comment:` header line AND the
      # base64 body, newline included) — set via:
      #     gh secret set TAURI_SIGNING_PRIVATE_KEY < sutra.key
      # Storing only the base64 body fails the build with
      # "Missing comment in secret key".
      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
              make_latest: 'true',
            });
