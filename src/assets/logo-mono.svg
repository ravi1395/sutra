  <path d="M44 16 C30 11 23 24 32 32 C41 40 34 53 20 48"
        stroke="currentColor" stroke-width="5.5" stroke-linecap="round"/>
  <circle cx="44" cy="16" r="5" fill="currentColor"/>
  <circle cx="20" cy="48" r="5" fill="currentColor"/>
</svg>
