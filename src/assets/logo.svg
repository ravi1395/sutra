<!-- Sutra primary mark: a single thread tracing an "S", strung with a bead at
     each end — sūtra (सूत्र) = the thread that binds. Self-contained colors. -->
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sutra">
  <defs>
    <linearGradient id="sutraThread" x1="44" y1="14" x2="20" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6ef0ad"/>
      <stop offset="1" stop-color="#1f8a63"/>
    </linearGradient>
  </defs>
  <!-- the thread -->
  <path d="M44 16 C30 11 23 24 32 32 C41 40 34 53 20 48"
        stroke="url(#sutraThread)" stroke-width="5.5" stroke-linecap="round"/>
  <!-- beads at each end of the strung thread -->
  <circle cx="44" cy="16" r="5" fill="#6ef0ad"/>
  <circle cx="20" cy="48" r="5" fill="#1f8a63"/>
</svg>
