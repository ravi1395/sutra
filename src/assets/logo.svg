      <stop offset="0" stop-color="#6ef0ad"/>
      <stop offset="1" stop-color="#1f8a63"/>
    </linearGradient>
  </defs>
  <path d="M20 13 H32 A7 7 0 0 1 39 20 V32 A7 7 0 0 1 32 39 H30 M22 39 H20 A7 7 0 0 1 13 32 V20 A7 7 0 0 1 20 13
